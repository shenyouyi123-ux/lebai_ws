# 真实硬件模式 MoveIt 控制器配置
# 格式参考乐白官方 lm3_controllers.yaml，controller_names 在顶层
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

controller_names:
  - lebai_trajectory_controller
  - gripper_bridge_controller

lebai_trajectory_controller:
  action_ns: ""
  type: FollowJointTrajectory
  default: true
  joints:
    - joint_1
    - joint_2
    - joint_3
    - joint_4
    - joint_5
    - joint_6

gripper_bridge_controller:
  action_ns: follow_joint_trajectory
  type: FollowJointTrajectory
  default: true
  joints:
    - gripper_r_joint1
