vision_grasp_orchestrator:
  ros__parameters:
    target_topic: /target_position
    joint_states_topic: /joint_states
    base_frame: base_link
    tool_link: tool0
    group_name: manipulator
    arm_joint_names: [joint_1, joint_2, joint_3, joint_4, joint_5, joint_6]

    move_group_action_name: /move_action
    execute_trajectory_action_name: /execute_trajectory
    compute_ik_service_name: /compute_ik
    compute_cartesian_path_service_name: /compute_cartesian_path
    apply_planning_scene_service_name: /apply_planning_scene
    gripper_action_name: /gripper_bridge_controller/follow_joint_trajectory
    gripper_joint_name: gripper_r_joint1

    target_unit_scale: 0.001
    target_timeout_sec: 0.6
    stable_window_size: 5
    stable_position_tolerance_m: 0.01

    grasp_offset_x_m: 0.0
    grasp_offset_y_m: 0.0
    grasp_offset_z_m: 0.0
    approach_height_m: 0.10
    lift_height_m: 0.12
    min_grasp_z_m: 0.03
    min_approach_z_m: 0.10
    min_lift_z_m: 0.12

    allowed_planning_time: 3.0
    num_planning_attempts: 5
    max_velocity_scaling: 0.20
    max_acceleration_scaling: 0.20
    ik_timeout_sec: 0.30
    goal_joint_tolerance: 0.01

    orientation_constraint_enabled: true
    orientation_tol_x_rad: 0.20
    orientation_tol_y_rad: 0.20
    orientation_tol_z_rad: 0.35

    cartesian_max_step_m: 0.005
    cartesian_jump_threshold: 0.0
    cartesian_fraction_threshold: 0.95

    gripper_open_rad: 1.0
    gripper_closed_rad: 0.0
    gripper_motion_sec: 1.0
    wait_after_gripper_sec: 0.3

    action_timeout_sec: 20.0
    service_timeout_sec: 5.0
    tf_timeout_sec: 1.0

    scene_apply_on_startup: true
    table_enabled: false
    table_id: table
    table_size_x_m: 0.8
    table_size_y_m: 1.2
    table_size_z_m: 0.04
    table_pose_x_m: 0.45
    table_pose_y_m: 0.0
    table_pose_z_m: -0.02
